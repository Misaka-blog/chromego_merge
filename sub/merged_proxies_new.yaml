port: 7890
allow-lan: true
mode: rule
log-level: info
unified-delay: true
global-client-fingerprint: chrome
dns:
  enable: true
  listen: :53
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
  - 223.5.5.5
  - 8.8.8.8
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  fallback:
  - https://1.0.0.1/dns-query
  - tls://dns.google
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
    - 240.0.0.0/4
proxies:
- alterId: 0
  cipher: auto
  name: Unknown_vmess_111
  network: tcp
  port: '1'
  server: 0.0.0.0
  servername: web.51.la
  tls: false
  type: vmess
  uuid: 88888888-8888-8888-8888-888888888888
- alterId: 0
  cipher: auto
  name: Unknown_vmess_112
  network: tcp
  port: '2'
  server: 0.0.0.0
  servername: web.51.la
  tls: false
  type: vmess
  uuid: 88888888-8888-8888-8888-888888888888
- alterId: 0
  cipher: auto
  name: Unknown_vmess_113
  network: tcp
  port: '3'
  server: 0.0.0.0
  servername: web.51.la
  tls: false
  type: vmess
  uuid: 88888888-8888-8888-8888-888888888888
proxy-groups:
- name: 节点选择
  type: select
  proxies:
  - 自动选择
  - DIRECT
  - Unknown_vmess_111
  - Unknown_vmess_112
  - Unknown_vmess_113
- name: 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies:
  - Unknown_vmess_111
  - Unknown_vmess_112
  - Unknown_vmess_113
rules:
- DOMAIN,clash.razord.top,DIRECT
- DOMAIN,yacd.haishan.me,DIRECT
- GEOIP,LAN,DIRECT
- GEOIP,CN,DIRECT
- MATCH,节点选择
